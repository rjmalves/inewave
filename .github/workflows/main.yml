name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install lint dependencies
        run: uv sync --extra lint
      - name: Run ruff linter
        run: uv run ruff check ./inewave
      - name: Run ruff formatter (check only)
        run: uv run ruff format --check ./inewave

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install lint dependencies
        run: uv sync --extra lint
      - name: Run mypy type checker
        run: uv run mypy ./inewave

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install test dependencies
        run: uv sync --extra test
      - name: Run tests
        run: uv run pytest --cov-report=xml --cov=inewave ./tests
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          env_vars: OS,PYTHON
          name: codecov-inewave
          fail_ci_if_error: true
          verbose: true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install docs dependencies
        run: uv sync --extra docs
      - name: Build Sphinx documentation
        run: uv run sphinx-build -M html docs/source docs/build
